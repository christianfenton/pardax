site_name: pardax
site_description: A flexible solver interface for PDEs, written in JAX.
repo_url: https://github.com/christianfenton/pardax
repo_name: christianfenton/pardax

theme:
  name: material

plugins:
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_object_full_path: false
            show_source: false
            heading_level: 2
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            members_order: source

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - pardax

nav:
  - Home: index.md
  - Tutorials:
    - Solving the heat equation: tutorials/heat_equation.md
  - User Guide: guide.md
  - Extending the Solver: extending.md
  - API Reference: api.md
